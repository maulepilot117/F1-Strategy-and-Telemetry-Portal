# Nginx reverse proxy config for the F1 strategy tool.
# - Serves the React SPA (static files) on port 80
# - Forwards /api/* requests to uvicorn (FastAPI) on port 8000
# - Also proxies /docs and /openapi.json so the interactive API docs work

server {
    listen 80;
    server_name _;

    # Serve the React build output
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: if the requested file doesn't exist, serve index.html
    # so that React Router (client-side routing) can handle the URL
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE proxy for live race data.
    # nginx uses longest prefix match, so /api/live/ naturally takes
    # priority over /api/ without needing specific ordering.
    location /api/live/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE requires these directives to prevent nginx from buffering
        # the event stream — without them, events pile up in nginx's
        # buffer and arrive in bursts instead of real-time
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        add_header X-Accel-Buffering no;

        # Let EventSource auto-reconnect on timeout — every message
        # is a full snapshot, so reconnection is free
        proxy_read_timeout 300s;
    }

    # Proxy API requests to the FastAPI backend (uvicorn)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # FastF1 first-fetches can take 2-4 minutes while downloading
        # race data from the F1 API — don't let nginx time out
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # FastAPI interactive docs (Swagger UI)
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # OpenAPI schema (used by /docs page to render the UI)
    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
