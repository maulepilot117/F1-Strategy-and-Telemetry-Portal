# Nginx reverse proxy config for the F1 strategy tool.
# - Serves the React SPA (static files) on port 80
# - Forwards /api/* requests to uvicorn (FastAPI) on port 8000
# - Also proxies /docs and /openapi.json so the interactive API docs work

server {
    listen 80;
    server_name _;

    # Serve the React build output
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: if the requested file doesn't exist, serve index.html
    # so that React Router (client-side routing) can handle the URL
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the FastAPI backend (uvicorn)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # FastF1 first-fetches can take 2-4 minutes while downloading
        # race data from the F1 API — don't let nginx time out
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # FastAPI interactive docs (Swagger UI)
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # OpenAPI schema (used by /docs page to render the UI)
    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
